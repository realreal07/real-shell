### alacritty.toml ###
#:tombi schema.strict = false

# Font
[font]
size = 10.0

[font.normal]
family = "JetBrainsMono Nerd Font"
style = "Regular"

[font.bold]
family = "JetBrainsMono Nerd Font"
style = "Bold"

[font.bold_italic]
family = "JetBrainsMono Nerd Font"
style = "Bold Italic"

[font.italic]
family = "JetBrainsMono Nerd Font"
style = "Italic"

# Colors
[colors]
draw_bold_text_with_bright_colors = true

[colors.primary]
foreground = "#018951"
background = "#10171b"

[colors.cursor]
text = "#2d353b"
cursor = "#66d979"

[colors.selection]
text = "#beffa7"
background = "#43614e"

[colors.normal]
black = "#343f44"
red = "#e67e80"
green = "#a7c080"
yellow = "#dbbc7f"
blue = "#7fbbb3"
magenta = "#d699b6"
cyan = "#83c092"
white = "#d3c6aa"

[colors.bright]
black = "#859289"
red = "#e67e80"
green = "#a7c080"
yellow = "#dbbc7f"
blue = "#7fbbb3"
magenta = "#d699b6"
cyan = "#83c092"
white = "#d3c6aa"

# Cursor
[cursor]
blink_interval = 400
blink_timeout = 0

[cursor.style]
shape = "Beam"
blinking = "On"

# Application
[window]
padding = {x = 10, y = 10}
dynamic_padding = false
opacity = 0.7

[scrolling]
history = 10000
multiplier = 3

[selection]
save_to_clipboard = false

[mouse]
hide_when_typing = true

[keyboard]
bindings = [
#    {key = "ArrowUp", mods = "Control", action = "IncreaseFontSize"},
#    {key = "ArrowDown", mods = "Control", action = "DecreaseFontSize"},
    {key = "0", mods = "Control", action = "ResetFontSize"},
#    {key = "=", mods = "Control", action = "None"},
#    {key = "-", mods = "Control", action = "None"}
]
