### DECORATIONS ###

general {
    gaps_in = 5
    gaps_out = 15
    float_gaps = 15
    #gaps_workspaces = 10

    border_size = 2
    col.active_border = $active_border_color
    col.inactive_border = $inactive_border_color

    resize_on_border = false
    extend_border_grab_area = false
    hover_icon_on_border = true

    allow_tearing = true

    layout = $layout
    
    snap {
        enabled = true

        window_gap = 10
        monitor_gap = 15

        border_overlap = true
        respect_gaps = true
    }
}

decoration {
    rounding = $rounding
    rounding_power = $rounding_power

    active_opacity = $win_active_opacity
    inactive_opacity = $win_inactive_opacity
    fullscreen_opacity = $win_fullscreen_opacity

    dim_inactive = false
    dim_strength = 0.2
    dim_modal = false

    border_part_of_window = true

    blur {
        enabled = $blur_enabled

        size = $blur_size
        passes = $blur_passes

        noise = 0.02
        contrast = 1.2
        brightness = 1.0
        vibrancy = 0.2
        vibrancy_darkness = 0.4

        ignore_opacity = true
        new_optimizations = true
        xray = false
        popups = true
    }

    shadow {
        enabled = $shadows_enabled
        range = $shadow_range
        render_power = 3
        scale = 1.0

        color = $shadow_active_color
        color_inactive = $shadow_inactive_color
        
        ignore_window = true
        sharp = false
    }
}