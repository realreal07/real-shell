### hyprland.conf CONSTRUCTOR ###

$conf_files = ~/Dotfiles/hyprland
$functions = $conf_files/functions
$themes = $conf_files/themes
$controls = $conf_files/controls
$vars = $conf_files/vars

monitor = , 2560x1440@240, 0x0, 1.25

# Vars
    source = $vars/globals.conf

# Controls
    source = $controls/misc.conf
    source = $controls/input.conf
    source = $controls/rules.conf
    source = $controls/layout.conf

# Functions
    source = $functions/startup.conf
    source = $functions/env.conf
    source = $functions/keybinds.conf

# Themes
    source = $themes/animation.conf
    source = $themes/cursor.conf
    source = $themes/general.conf
    source = $themes/decoration.conf

