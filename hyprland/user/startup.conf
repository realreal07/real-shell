### STARTUP ###

# Initialize
    exec-once = $browser
    exec-once = discord

    exec-once = [workspace special:system silent; float; size 1100 500; move monitor_w-1100-15 15] $terminal -e sh -c "htop; exec $SHELL"
    exec-once = [workspace special:system silent] $terminal -e sh -c "fastfetch; exec $SHELL"

    exec-once = swaync
    exec-once = linux-wallpaperengine --scaling fill --silent --screen-root DP-2 $wallpaper_id
    exec-once = systemctl --user start hyprpolkitagent
