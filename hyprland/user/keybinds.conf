####################
##### KEYBINDS #####
####################

##### Quick launch #####
    bind = $main_mod, W, exec, $terminal
    bind = $main_mod, A, exec, $browser
    bind = $main_mod, E, exec, $file_manager
    bindr = $main_mod, D, exec, pkill $app_menu || $app_menu -show drun

##### Windows #####
    # Manipulate
    bind = $main_mod, F, fullscreen, 1
    bind = $main_mod CTRL, F, fullscreen, 0
    bind = $main_mod, grave, layoutmsg, togglesplit
    bind = $main_mod, B, centerwindow,
    bind = $main_mod, P, pseudo
    bind = $main_mod SHIFT, V, togglefloating

    # Control
    bind = $main_mod, Q, killactive,`
    bindl = $main_mod, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
    bind = $main_mod CTRL, Q, exit

    # Move focus
    bind = $main_mod, left, movefocus, l
    bind = $main_mod, right, movefocus, r
    bind = $main_mod, up, movefocus, u
    bind = $main_mod, down, movefocus, d

##### Special workspaces #####
    # Magic
    bind = $main_mod, S, togglespecialworkspace, magic
    bind = $main_mod SHIFT, S, movetoworkspace, special:magic
    bindr = , mouse:275, togglespecialworkspace, magic

    # System
    bind = $main_mod, X, togglespecialworkspace, system
    bind = $main_mod SHIFT, X, movetoworkspace, special:system

##### Workspace movement #####
    bind = $main_mod, 1, workspace, 1
    bind = $main_mod, 2, workspace, 2
    bind = $main_mod, 3, workspace, 3
    bind = $main_mod, 4, workspace, 4
    bind = $main_mod, 5, workspace, 5
    bind = $main_mod, 6, workspace, 6
    bind = $main_mod, 7, workspace, 7
    bind = $main_mod, 8, workspace, 8
    bind = $main_mod, 9, workspace, 9
    bind = $main_mod, 0, workspace, 10

    bind = $main_mod SHIFT, 1, movetoworkspace, 1
    bind = $main_mod SHIFT, 2, movetoworkspace, 2
    bind = $main_mod SHIFT, 3, movetoworkspace, 3
    bind = $main_mod SHIFT, 4, movetoworkspace, 4
    bind = $main_mod SHIFT, 5, movetoworkspace, 5
    bind = $main_mod SHIFT, 6, movetoworkspace, 6
    bind = $main_mod SHIFT, 7, movetoworkspace, 7
    bind = $main_mod SHIFT, 8, movetoworkspace, 8
    bind = $main_mod SHIFT, 9, movetoworkspace, 9
    bind = $main_mod SHIFT, 0, movetoworkspace, 10

    bind = $main_mod, mouse_down, workspace, e+1
    bind = $main_mod, mouse_up, workspace, e-1
    bindr = , mouse:276, workspace, e+1

##### Window mouse controls #####
    bindm = $main_mod, mouse:272, movewindow
    bindm = $main_mod, mouse:273, resizewindow
    bindr = $main_mod, mouse:274, togglefloating

##### Utilities #####
    # Screenshotting
    bind = $main_mod CTRL, S, exec, grimblast --freeze --notify copy area
    bind = $main_mod ALT, S, exec, grimblast --freeze --notify copysave area ~/Pictures/screenshots/Screenshot-$(date +%Y-%m-%d_%H-%m-%s).png
    bind = $main_mod CTRL ALT, S, exec, grimblast --freeze --notify copysave screen ~/Pictures/screenshots/Screenshot-$(date +%Y-%m-%d_%H-%m-%s).png
    
    # Clipboard history
    bind = $main_mod, V, exec, $terminal --class clipse -e clipse

    # Color picker
    bind = $main_mod CTRL, C, exec, hyprpicker -a -n -f hex --radius 60

##### Laptop multimedia keys for volume and LCD brightness ##### -- change these later
    bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
    bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
    bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
    bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
    bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
    bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

##### Playerctl binds ##### -- add these later
    bindl = , XF86AudioNext, exec, playerctl next
    bindl = , XF86AudioPause, exec, playerctl play-pause
    bindl = , XF86AudioPlay, exec, playerctl play-pause
    bindl = , XF86AudioPrev, exec, playerctl previous


