######################
##### ANIMATIONS #####
######################

animations {
    enabled = $bool_anim_enabled
    workspace_wraparound = true

    ##### Curves #####
    bezier = easeOutQuint, 0.23, 1, 0.32, 1
    bezier = linear, 0, 0, 1, 1
    bezier = smoothEase, 0.25, 0.1, 0.25, 1
    bezier = quick, 0.3, 1, 0.2, 1
    bezier = sharpQuick, 0.15, 1, 0.1, 1
    bezier = fastAccel, 0.3, 0, 0.2, 1
    bezier = fastDecel, 0.8, 0, 0.7, 1

    ##### Animations #####
    animation = global, 1, 5, easeOutQuint
    animation = border, 1, 3, fastDecel
    animation = zoomFactor, 1, 7, quick

    animation = windowsIn, 1, 3, sharpQuick
    animation = windowsOut, 1, 1.5, fastDecel, popin 70%
    animation = windowsMove, 1, 3, fastAccel

    animation = workspaces, 1, 2, smoothEase, fade
    animation = specialWorkspace, 1, 4, sharpQuick, slidefadevert

    animation = fade, 1, 6, quick
    animation = fadeIn, 1, 4, fastAccel
    animation = fadeOut, 1, 4, sharpQuick
    animation = fadeLayers, 1, 4, quick

    animation = layersIn, 1, 4, fastAccel, fade
    animation = layersOut, 1, 3, sharpQuick, fade
  
}